name: CRJ700 Runtime Verification

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-crj700-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out exact PR head commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install application dependencies
        run: npm ci

      - name: Reconstruct and verify aircraft asset
        run: npm run verify

      - name: Build production artifact
        run: npm run build

      - name: Install browser verifier
        run: |
          npm install --no-save @playwright/test@1.52.0
          npx playwright install --with-deps chromium

      - name: Verify aircraft and pushback lifecycle in a real browser runtime
        run: npx playwright test tests/browser/crj700-runtime.spec.js tests/browser/pushback-connection-runtime.spec.js

      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crj700-runtime-evidence
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
