name: Verify and Deploy RampReady Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify assets, runtime, physics, and towing
        run: npm run verify

      - name: Build production site
        run: npm run build

      - name: Confirm Pages artifact contains CRJ700 runtime model
        shell: bash
        run: |
          test -f dist/index.html
          test -f dist/models/crj700/crj700-mobile.glb
          cmp --silent public/models/crj700/crj700-mobile.glb dist/models/crj700/crj700-mobile.glb

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload verified Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy exact verified artifact
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live-pages:
    if: github.event_name != 'pull_request'
    needs: deploy
    runs-on: ubuntu-latest
    env:
      PAGE_URL: ${{ needs.deploy.outputs.page_url }}
    steps:
      - name: Checkout exact deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify live Pages document and CRJ700 asset
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PAGE_URL"
          case "$PAGE_URL" in
            */) ;;
            *) PAGE_URL="$PAGE_URL/" ;;
          esac

          curl --fail --location --retry 12 --retry-delay 5 --retry-all-errors \
            --output live-index.html "$PAGE_URL"
          test -s live-index.html
          grep -qi '<div id="root"></div>' live-index.html

          curl --fail --location --retry 12 --retry-delay 5 --retry-all-errors \
            --output live-crj700-mobile.glb \
            "${PAGE_URL}models/crj700/crj700-mobile.glb"
          test -s live-crj700-mobile.glb
          cmp --silent public/models/crj700/crj700-mobile.glb live-crj700-mobile.glb

          echo "Verified live Pages URL: $PAGE_URL"
          echo "Verified live CRJ700 asset: ${PAGE_URL}models/crj700/crj700-mobile.glb"

      - name: Install Chromium browser runtime
        run: npx --yes playwright@1.55.0 install --with-deps chromium

      - name: Open deployed trainer and capture end-user render
        shell: bash
        run: |
          set -euo pipefail
          npx --yes playwright@1.55.0 screenshot \
            --browser chromium \
            --viewport-size "1440,900" \
            --wait-for-timeout 15000 \
            "$PAGE_URL" \
            live-rampready.png
          test -s live-rampready.png
          test "$(stat -c%s live-rampready.png)" -gt 10000
          file live-rampready.png | grep -q 'PNG image data'

      - name: Upload live browser evidence
        uses: actions/upload-artifact@v4
        with:
          name: rampready-live-browser-${{ github.sha }}
          path: |
            live-index.html
            live-rampready.png
          if-no-files-found: error
          retention-days: 14
