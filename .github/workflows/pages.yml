name: Verify and Deploy RampReady Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify assets, runtime, physics, and towing
        run: npm run verify

      - name: Build production site
        run: npm run build

      - name: Confirm Pages artifact contains CRJ700 runtime model
        shell: bash
        run: |
          test -f dist/index.html
          test -f dist/models/crj700/crj700-mobile.glb
          cmp --silent public/models/crj700/crj700-mobile.glb dist/models/crj700/crj700-mobile.glb

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload verified Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy exact verified artifact
        id: deployment
        uses: actions/deploy-pages@v4
