name: Verify and Deploy RampReady Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify assets, runtime, physics, and towing
        run: npm run verify

      - name: Build production site
        run: npm run build

      - name: Confirm Pages artifact contains CRJ700 runtime model
        shell: bash
        run: |
          test -f dist/index.html
          test -f dist/models/crj700/crj700-mobile.glb
          cmp --silent public/models/crj700/crj700-mobile.glb dist/models/crj700/crj700-mobile.glb

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload verified Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: verify-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy exact verified artifact
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live-pages:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      PAGE_URL: ${{ needs.deploy.outputs.page_url }}
    steps:
      - name: Checkout exact deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify live Pages document and CRJ700 asset
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PAGE_URL"
          case "$PAGE_URL" in
            */) ;;
            *) PAGE_URL="$PAGE_URL/" ;;
          esac

          curl --fail --location --retry 12 --retry-delay 5 --retry-all-errors \
            --output live-index.html "$PAGE_URL"
          test -s live-index.html
          grep -qi '<div id="root"></div>' live-index.html

          curl --fail --location --retry 12 --retry-delay 5 --retry-all-errors \
            --output live-crj700-mobile.glb \
            "${PAGE_URL}models/crj700/crj700-mobile.glb"
          test -s live-crj700-mobile.glb
          cmp --silent public/models/crj700/crj700-mobile.glb live-crj700-mobile.glb

          echo "Verified live Pages URL: $PAGE_URL"
          echo "Verified live CRJ700 asset: ${PAGE_URL}models/crj700/crj700-mobile.glb"

      - name: Install Chromium browser runtime
        run: npx --yes playwright@1.55.0 install --with-deps chromium

      - name: Verify deployed trainer runtime and capture evidence
        shell: bash
        run: |
          set -euo pipefail
          cat > live-pages.spec.js <<'EOF'
          const { test, expect } = require('@playwright/test');

          test('deployed RampReady launches through equipment selection and renders the aircraft without browser failures', async ({ page }) => {
            const consoleErrors = [];
            const pageErrors = [];
            let crj700Response = null;

            page.on('console', (message) => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });
            page.on('pageerror', (error) => pageErrors.push(error.message));
            page.on('response', (response) => {
              if (response.url().includes('/models/crj700/crj700-mobile.glb')) {
                crj700Response = {
                  status: response.status(),
                  contentType: response.headers()['content-type'] || '',
                  url: response.url(),
                };
              }
            });

            await page.setViewportSize({ width: 1440, height: 900 });
            await page.goto(process.env.PAGE_URL, { waitUntil: 'networkidle', timeout: 120000 });

            await expect(page.getByRole('heading', { name: 'Choose pushback equipment' })).toBeVisible();
            const lektroCard = page.getByRole('radio', { name: /Lektro 88/i });
            await lektroCard.click();
            await expect(lektroCard).toHaveAttribute('aria-checked', 'true');
            const startButton = page.getByRole('button', { name: 'Start training' });
            await expect(startButton).toBeEnabled();
            await startButton.click();

            const canvas = page.locator('canvas.trainerCanvas').first();
            await expect(canvas).toBeVisible({ timeout: 30000 });
            const box = await canvas.boundingBox();
            expect(box).not.toBeNull();
            expect(box.width).toBeGreaterThan(300);
            expect(box.height).toBeGreaterThan(200);

            await expect.poll(
              async () => page.locator('html').getAttribute('data-aircraft-asset-state'),
              { timeout: 45000, intervals: [250, 500, 1000] },
            ).toBe('ready');

            const runtimeState = await page.evaluate(() => window.__RAMPREADY_RUNTIME__);
            expect(runtimeState).toEqual(expect.objectContaining({
              aircraftAssetState: 'ready',
              renderedAircraftSource: expect.any(String),
            }));
            expect(runtimeState.dimensions).toEqual(expect.objectContaining({
              length: expect.any(Number),
              wingspan: expect.any(Number),
            }));
            expect(runtimeState.renderProof).toEqual(expect.objectContaining({
              realModelAttached: true,
              realModelVisible: true,
              realMeshCount: expect.any(Number),
              visibleRealMeshCount: expect.any(Number),
              hiddenProceduralChildCount: expect.any(Number),
              retainedVisibleChildCount: expect.any(Number),
            }));
            expect(runtimeState.renderProof.realMeshCount).toBeGreaterThan(0);
            expect(runtimeState.renderProof.visibleRealMeshCount).toBe(runtimeState.renderProof.realMeshCount);
            expect(runtimeState.renderProof.hiddenProceduralChildCount).toBeGreaterThan(0);

            expect(crj700Response).not.toBeNull();
            expect(crj700Response.status).toBe(200);
            expect(consoleErrors).toEqual([]);
            expect(pageErrors).toEqual([]);

            await page.screenshot({ path: 'live-rampready.png', fullPage: true });
            require('node:fs').writeFileSync(
              'live-runtime-state.json',
              JSON.stringify(runtimeState, null, 2),
            );
          });
          EOF

          npx --yes --package=@playwright/test@1.55.0 playwright test live-pages.spec.js --reporter=line
          test -s live-rampready.png
          test "$(stat -c%s live-rampready.png)" -gt 10000
          file live-rampready.png | grep -q 'PNG image data'
          test -s live-runtime-state.json
          grep -q '"realModelAttached": true' live-runtime-state.json
          grep -q '"realModelVisible": true' live-runtime-state.json

      - name: Upload live browser evidence
        uses: actions/upload-artifact@v4
        with:
          name: rampready-live-browser-${{ github.sha }}
          path: |
            live-index.html
            live-rampready.png
            live-runtime-state.json
            test-results/
          if-no-files-found: error
          retention-days: 14
