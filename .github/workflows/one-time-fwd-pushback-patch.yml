name: One-time FWD pushback patch

on:
  push:
    branches: [fix/fwd-pushback-semantics]
    paths: [.github/workflows/one-time-fwd-pushback-patch.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/fwd-pushback-semantics
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply FWD semantics and update matching checks
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
            'connectedPushPhase && drive.direction !== -1': 'connectedPushPhase && drive.direction !== 1',
            'towActive && drive.direction !== -1': 'towActive && drive.direction !== 1',
            'stageRef.current === 4 && drive.direction !== -1 ? "REV required"': 'stageRef.current === 4 && drive.direction !== 1 ? "FWD required"',
            'stageRef.current === 4 && drive.direction !== -1) liveMessage = "Direction should be REV for pushback. Power locked until REV is selected."': 'stageRef.current === 4 && drive.direction !== 1) liveMessage = "Direction should be FWD for pushback. Power locked until FWD is selected."',
            'stageRef.current === 4 && drive.direction === -1 && stopRemaining <= STOP_REMAINING_CAUTION': 'stageRef.current === 4 && drive.direction === 1 && stopRemaining <= STOP_REMAINING_CAUTION',
            'driveRef.current.direction = -1;': 'driveRef.current.direction = 1;',
            'setDirection("REV");': 'setDirection("FWD");',
            'Brake released. REV selected for pushback. Add power slowly.': 'Brake released. FWD selected for pushback. Add power slowly.',
            'Direction should be REV for pushback': 'Direction should be FWD for pushback',
            'REV required': 'FWD required',
          }

          for path in [Path('src/components/RampReadyTrainerStable.jsx'), *Path('scripts').glob('*.mjs')]:
            if not path.exists():
              continue
            text = path.read_text()
            for old, new in replacements.items():
              text = text.replace(old, new)
            path.write_text(text)

          source = Path('src/components/RampReadyTrainerStable.jsx').read_text()
          required = [
            'connectedPushPhase && drive.direction !== 1',
            'towActive && drive.direction !== 1',
            'FWD required',
            'Direction should be FWD for pushback',
            'driveRef.current.direction = 1;',
            'setDirection("FWD");',
            'Brake released. FWD selected for pushback',
          ]
          forbidden = [
            'connectedPushPhase && drive.direction !== -1',
            'towActive && drive.direction !== -1',
            'REV required',
            'Direction should be REV for pushback',
            'Brake released. REV selected for pushback',
          ]
          for token in required:
            assert token in source, f'Missing required FWD invariant: {token}'
          for token in forbidden:
            assert token not in source, f'Legacy REV invariant remains: {token}'
          PY
      - name: Install, verify, and build
        run: |
          npm ci
          npm run verify
          npm run build
      - name: Commit verified application fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/RampReadyTrainerStable.jsx scripts
          git diff --cached --quiet && { echo 'No application changes produced'; exit 1; }
          git commit -m 'Correct connected pushback to use FWD'
          git push origin HEAD:fix/fwd-pushback-semantics
