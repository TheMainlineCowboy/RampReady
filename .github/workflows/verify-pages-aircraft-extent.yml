name: Verify RampReady CRJ700 Visual Extent

on:
  workflow_run:
    workflows:
      - Deploy RampReady to GitHub Pages
    types:
      - completed
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact deployed commit SHA to verify
        required: true
        type: string

permissions:
  contents: read

env:
  PAGE_URL: https://themainlinecowboy.github.io/RampReady/

jobs:
  verify-visible-aircraft-extent:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve exact deployed commit
        id: release
        shell: bash
        env:
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          expected_sha="${WORKFLOW_SHA:-${DISPATCH_SHA:-}}"
          test -n "${expected_sha}"
          echo "expected_sha=${expected_sha}" >> "${GITHUB_OUTPUT}"

      - name: Check out exact deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.expected_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Wait for exact GitHub Pages release
        shell: bash
        env:
          EXPECTED_SHA: ${{ steps.release.outputs.expected_sha }}
        run: |
          set -euo pipefail
          for attempt in {1..18}; do
            status=$(curl -L -sS -o /tmp/release-commit.txt -w '%{http_code}' "${PAGE_URL}release-commit.txt")
            live_sha=$(tr -d '\r\n' < /tmp/release-commit.txt 2>/dev/null || true)
            if [ "${status}" = "200" ] && [ "${live_sha}" = "${EXPECTED_SHA}" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "GitHub Pages did not serve exact commit ${EXPECTED_SHA}." >&2
          exit 1

      - name: Verify useful CRJ700 visual extent
        shell: bash
        env:
          EXPECTED_SHA: ${{ steps.release.outputs.expected_sha }}
        run: |
          set -euo pipefail
          npx --yes playwright@1.53.1 install --with-deps chromium
          mkdir -p aircraft-extent-verification
          cat > /tmp/verify-aircraft-extent.cjs <<'EOF'
          const { chromium } = require('playwright');
          const { PNG } = require('pngjs');
          const fs = require('node:fs');

          const pageUrl = process.env.PAGE_URL;
          const expectedSha = process.env.EXPECTED_SHA;
          const modelSuffix = '/models/crj700-mobile.glb';

          function analyze(path) {
            const png = PNG.sync.read(fs.readFileSync(path));
            const stride = 2;
            const cols = Math.ceil(png.width / stride);
            const rows = Math.ceil(png.height / stride);
            const mask = new Uint8Array(cols * rows);
            const roi = {
              minX: Math.floor(cols * 0.12),
              maxX: Math.ceil(cols * 0.88),
              minY: Math.floor(rows * 0.08),
              maxY: Math.ceil(rows * 0.92),
            };

            for (let gy = roi.minY; gy < roi.maxY; gy += 1) {
              for (let gx = roi.minX; gx < roi.maxX; gx += 1) {
                const x = Math.min(png.width - 1, gx * stride);
                const y = Math.min(png.height - 1, gy * stride);
                const i = (y * png.width + x) * 4;
                const r = png.data[i];
                const g = png.data[i + 1];
                const b = png.data[i + 2];
                const a = png.data[i + 3];
                const spread = Math.max(r, g, b) - Math.min(r, g, b);
                if (a > 16 && r > 165 && g > 165 && b > 165 && spread < 48) {
                  mask[gy * cols + gx] = 1;
                }
              }
            }

            const visited = new Uint8Array(mask.length);
            const components = [];
            const neighbors = [-1, 0, 1];
            for (let gy = roi.minY; gy < roi.maxY; gy += 1) {
              for (let gx = roi.minX; gx < roi.maxX; gx += 1) {
                const start = gy * cols + gx;
                if (!mask[start] || visited[start]) continue;
                const queue = [start];
                visited[start] = 1;
                let head = 0;
                let count = 0;
                let minX = gx;
                let maxX = gx;
                let minY = gy;
                let maxY = gy;
                let sumX = 0;
                let sumY = 0;
                let touchesRoiEdge = false;

                while (head < queue.length) {
                  const index = queue[head++];
                  const cy = Math.floor(index / cols);
                  const cx = index - cy * cols;
                  count += 1;
                  sumX += cx;
                  sumY += cy;
                  minX = Math.min(minX, cx);
                  maxX = Math.max(maxX, cx);
                  minY = Math.min(minY, cy);
                  maxY = Math.max(maxY, cy);
                  if (cx <= roi.minX || cx >= roi.maxX - 1 || cy <= roi.minY || cy >= roi.maxY - 1) touchesRoiEdge = true;

                  for (const dy of neighbors) {
                    for (const dx of neighbors) {
                      if (dx === 0 && dy === 0) continue;
                      const nx = cx + dx;
                      const ny = cy + dy;
                      if (nx < roi.minX || nx >= roi.maxX || ny < roi.minY || ny >= roi.maxY) continue;
                      const next = ny * cols + nx;
                      if (!mask[next] || visited[next]) continue;
                      visited[next] = 1;
                      queue.push(next);
                    }
                  }
                }

                const width = (maxX - minX + 1) * stride;
                const height = (maxY - minY + 1) * stride;
                const centerX = (sumX / count) * stride;
                const centerY = (sumY / count) * stride;
                const fillRatio = count / ((maxX - minX + 1) * (maxY - minY + 1));
                const centerDistance = Math.hypot(centerX - png.width / 2, centerY - png.height / 2);
                components.push({ count, minX: minX * stride, maxX: maxX * stride, minY: minY * stride, maxY: maxY * stride, width, height, centerX, centerY, centerDistance, fillRatio, touchesRoiEdge });
              }
            }

            const candidates = components
              .filter(component => !component.touchesRoiEdge)
              .filter(component => component.count >= 250)
              .filter(component => component.fillRatio >= 0.025)
              .sort((a, b) => (b.count - a.count) || (a.centerDistance - b.centerDistance));
            const aircraft = candidates[0] || null;
            return {
              imageWidth: png.width,
              imageHeight: png.height,
              sampledComponentCount: components.length,
              candidateCount: candidates.length,
              aircraft,
            };
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
            const errors = [];
            let modelResponse = null;
            page.on('pageerror', error => errors.push(error.message));
            page.on('console', message => { if (message.type() === 'error') errors.push(message.text()); });
            page.on('response', response => {
              if (response.url().endsWith(modelSuffix)) modelResponse = { url: response.url(), status: response.status(), ok: response.ok() };
            });

            const response = await page.goto(pageUrl, { waitUntil: 'networkidle', timeout: 60000 });
            if (!response?.ok()) throw new Error(`Navigation failed: ${response?.status() || 'no response'}`);
            await page.waitForSelector('canvas', { state: 'visible', timeout: 30000 });
            await page.waitForFunction(suffix => performance.getEntriesByType('resource').some(entry => entry.name.endsWith(suffix)), modelSuffix, { timeout: 30000 });
            await page.waitForTimeout(12000);
            if (!modelResponse?.ok || modelResponse.status !== 200) throw new Error('Successful CRJ700 GLB response was not observed');

            await page.addStyleTag({ content: '.rr-hud,.rr-metrics,.rr-score-float,.rr-guidance,.rr-steer,.rr-throttle,.rr-diagnostics { display:none !important; }' });
            await page.selectOption('.rr-view-select', 'overhead');
            await page.waitForTimeout(3000);
            const path = 'aircraft-extent-verification/crj700-overhead-extent.png';
            await page.locator('canvas').first().screenshot({ path });
            const metrics = analyze(path);
            if (!metrics.aircraft) throw new Error('No isolated central CRJ700 airframe component was detected');
            if (metrics.aircraft.count < 900) throw new Error(`Connected airframe pixel evidence too low: ${metrics.aircraft.count}`);
            if (metrics.aircraft.width < 260) throw new Error(`Connected aircraft visible width too small: ${metrics.aircraft.width}px`);
            if (metrics.aircraft.height < 180) throw new Error(`Connected aircraft visible height too small: ${metrics.aircraft.height}px`);
            if (metrics.aircraft.centerDistance > 360) throw new Error(`Aircraft component is implausibly far from frame center: ${metrics.aircraft.centerDistance.toFixed(1)}px`);
            if (errors.length) throw new Error(`Browser errors: ${errors.join(' | ')}`);

            fs.writeFileSync('aircraft-extent-verification/report.json', JSON.stringify({ expectedSha, pageUrl, capturedAtUtc: new Date().toISOString(), modelResponse, metrics }, null, 2));
            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          EOF
          npm exec --yes --package=playwright@1.53.1 --package=pngjs@7.0.0 -- node /tmp/verify-aircraft-extent.cjs
          test -s aircraft-extent-verification/crj700-overhead-extent.png
          test -s aircraft-extent-verification/report.json

      - name: Upload exact production extent evidence
        uses: actions/upload-artifact@v4
        with:
          name: rampready-crj700-production-extent-${{ steps.release.outputs.expected_sha }}
          path: aircraft-extent-verification/
          if-no-files-found: error
          retention-days: 30
