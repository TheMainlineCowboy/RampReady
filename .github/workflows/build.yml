name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rampready-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build and verify production output
        run: npm run build

      - name: Verify build did not mutate tracked source
        run: git diff --exit-code -- . ':!dist'

      - name: Verify deploy artifact
        run: |
          test -f dist/index.html
          test -d dist/assets
          test -n "$(find dist/assets -type f -print -quit)"

      - name: Upload verified production artifact
        uses: actions/upload-artifact@v4
        with:
          name: rampready-production-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
