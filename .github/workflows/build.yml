name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rampready-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build and verify production output
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee rampready-build.log

      - name: Capture tracked source mutation diff
        if: always()
        shell: bash
        run: git diff --binary -- . ':!dist' > rampready-source-diff.patch

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rampready-build-diagnostics-${{ github.sha }}
          path: |
            rampready-build.log
            rampready-source-diff.patch
          if-no-files-found: warn
          retention-days: 7

      - name: Verify build did not mutate tracked source
        if: always()
        shell: bash
        run: |
          if ! git diff --exit-code -- . ':!dist'; then
            echo "Production build left tracked repository files modified."
            echo "Runtime preparation must restore the trainer and all verification inputs even after failure."
            echo "Download rampready-build-diagnostics-${{ github.sha }} for the exact source diff."
            exit 1
          fi

      - name: Verify deploy artifact
        run: |
          test -f dist/index.html
          test -d dist/assets
          test -n "$(find dist/assets -type f -print -quit)"

      - name: Upload verified production artifact
        uses: actions/upload-artifact@v4
        with:
          name: rampready-production-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
