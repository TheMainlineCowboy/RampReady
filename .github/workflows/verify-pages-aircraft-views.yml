name: Verify RampReady CRJ700 Production Views

on:
  workflow_run:
    workflows:
      - Deploy RampReady to GitHub Pages
    types:
      - completed
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact deployed commit SHA to verify
        required: true
        type: string

permissions:
  contents: read

env:
  PAGE_URL: https://themainlinecowboy.github.io/RampReady/

jobs:
  verify-aircraft-views:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve exact deployed commit
        id: release
        shell: bash
        env:
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          expected_sha="${WORKFLOW_SHA:-${DISPATCH_SHA:-}}"
          test -n "${expected_sha}"
          echo "expected_sha=${expected_sha}" >> "${GITHUB_OUTPUT}"

      - name: Check out exact deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.expected_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Wait for exact GitHub Pages release
        shell: bash
        env:
          EXPECTED_SHA: ${{ steps.release.outputs.expected_sha }}
        run: |
          set -euo pipefail
          for attempt in {1..18}; do
            status=$(curl -L -sS -o /tmp/release-commit.txt -w '%{http_code}' "${PAGE_URL}release-commit.txt")
            live_sha=$(tr -d '\r\n' < /tmp/release-commit.txt 2>/dev/null || true)
            if [ "${status}" = "200" ] && [ "${live_sha}" = "${EXPECTED_SHA}" ]; then
              echo "Exact release ${EXPECTED_SHA} is live."
              exit 0
            fi
            echo "Attempt ${attempt}: marker=${status}, live_sha=${live_sha:-missing}; retrying..."
            sleep 10
          done
          echo "GitHub Pages did not serve exact commit ${EXPECTED_SHA}." >&2
          exit 1

      - name: Capture unobstructed CRJ700 production views
        shell: bash
        env:
          EXPECTED_SHA: ${{ steps.release.outputs.expected_sha }}
        run: |
          set -euo pipefail
          npx --yes playwright@1.53.1 install --with-deps chromium
          mkdir -p aircraft-view-verification
          cat > /tmp/verify-aircraft-views.cjs <<'EOF'
          const { chromium } = require('playwright');
          const { PNG } = require('pngjs');
          const fs = require('node:fs');

          const pageUrl = process.env.PAGE_URL;
          const expectedSha = process.env.EXPECTED_SHA;
          const modelSuffix = '/models/crj700-mobile.glb';
          const overlaySelectors = [
            '.rr-hud', '.rr-metrics', '.rr-score-float', '.rr-guidance',
            '.rr-steer', '.rr-throttle', '.rr-diagnostics'
          ];

          function analyze(filePath) {
            const png = PNG.sync.read(fs.readFileSync(filePath));
            let samples = 0;
            let airframe = 0;
            let blue = 0;
            let red = 0;
            const stride = Math.max(1, Math.floor(Math.min(png.width, png.height) / 220));
            for (let y = 0; y < png.height; y += stride) {
              for (let x = 0; x < png.width; x += stride) {
                const offset = (png.width * y + x) * 4;
                const r = png.data[offset];
                const g = png.data[offset + 1];
                const b = png.data[offset + 2];
                const a = png.data[offset + 3];
                if (a < 16) continue;
                samples += 1;
                const spread = Math.max(r, g, b) - Math.min(r, g, b);
                if (r > 170 && g > 170 && b > 170 && spread < 42) airframe += 1;
                if (b > 72 && b > r * 1.16 && b > g * 1.06) blue += 1;
                if (r > 112 && r > g * 1.3 && r > b * 1.2) red += 1;
              }
            }
            return { width: png.width, height: png.height, samples, airframe, blue, red };
          }

          async function prepare(page) {
            let modelResponse = null;
            page.on('response', response => {
              if (response.url().endsWith(modelSuffix)) {
                modelResponse = {
                  url: response.url(),
                  status: response.status(),
                  ok: response.ok()
                };
              }
            });

            const response = await page.goto(pageUrl, { waitUntil: 'networkidle', timeout: 60000 });
            if (!response || !response.ok()) throw new Error(`Navigation failed: ${response?.status() || 'no response'}`);
            await page.waitForSelector('canvas', { state: 'visible', timeout: 30000 });
            await page.waitForFunction(
              suffix => performance.getEntriesByType('resource').some(entry => entry.name.endsWith(suffix)),
              modelSuffix,
              { timeout: 30000 }
            );
            await page.waitForTimeout(12000);

            const resourceUrl = await page.evaluate(
              suffix => performance.getEntriesByType('resource').find(entry => entry.name.endsWith(suffix))?.name || null,
              modelSuffix
            );
            if (!resourceUrl) throw new Error('CRJ700 GLB is absent from browser resource timing entries');
            if (!modelResponse) throw new Error('CRJ700 GLB response was not observed by Playwright');
            if (!modelResponse.ok || modelResponse.status !== 200) {
              throw new Error(`CRJ700 GLB request failed: ${modelResponse.status} ${modelResponse.url}`);
            }

            await page.addStyleTag({ content: `${overlaySelectors.join(',')} { display: none !important; }` });
            return { ...modelResponse, resourceUrl };
          }

          async function captureOrbit(browser, name, dragX) {
            const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
            const errors = [];
            page.on('pageerror', error => errors.push(error.message));
            page.on('console', message => { if (message.type() === 'error') errors.push(message.text()); });
            const model = await prepare(page);
            await page.selectOption('.rr-view-select', 'chase');
            const canvas = page.locator('canvas').first();
            const box = await canvas.boundingBox();
            if (!box) throw new Error('Canvas bounding box unavailable');
            const startX = box.x + box.width / 2;
            const startY = box.y + box.height / 2;
            await page.mouse.move(startX, startY);
            await page.mouse.down();
            await page.mouse.move(startX + dragX, startY, { steps: 24 });
            await page.mouse.up();
            await page.waitForTimeout(2500);
            const path = `aircraft-view-verification/${name}.png`;
            await canvas.screenshot({ path });
            if (errors.length) throw new Error(`${name} browser errors: ${errors.join(' | ')}`);
            await page.close();
            return { ...analyze(path), model };
          }

          async function captureOverhead(browser) {
            const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
            const errors = [];
            page.on('pageerror', error => errors.push(error.message));
            page.on('console', message => { if (message.type() === 'error') errors.push(message.text()); });
            const model = await prepare(page);
            await page.selectOption('.rr-view-select', 'overhead');
            await page.waitForTimeout(2500);
            const path = 'aircraft-view-verification/crj700-overhead.png';
            await page.locator('canvas').first().screenshot({ path });
            if (errors.length) throw new Error(`overhead browser errors: ${errors.join(' | ')}`);
            await page.close();
            return { ...analyze(path), model };
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const left = await captureOrbit(browser, 'crj700-left', 220);
            const right = await captureOrbit(browser, 'crj700-right', -220);
            const overhead = await captureOverhead(browser);
            await browser.close();

            for (const [name, metrics] of Object.entries({ left, right })) {
              if (metrics.airframe < 220) throw new Error(`${name} airframe evidence too low: ${metrics.airframe}`);
              if (metrics.blue < 35) throw new Error(`${name} blue livery evidence too low: ${metrics.blue}`);
              if (metrics.red < 10) throw new Error(`${name} red livery evidence too low: ${metrics.red}`);
              if (!metrics.model?.ok || metrics.model.status !== 200) throw new Error(`${name} lacks a successful CRJ700 GLB response`);
            }
            if (overhead.airframe < 180) throw new Error(`overhead airframe evidence too low: ${overhead.airframe}`);
            if (!overhead.model?.ok || overhead.model.status !== 200) throw new Error('overhead view lacks a successful CRJ700 GLB response');

            const report = { expectedSha, pageUrl, capturedAtUtc: new Date().toISOString(), left, right, overhead };
            fs.writeFileSync('aircraft-view-verification/report.json', JSON.stringify(report, null, 2));
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          EOF
          npm exec --yes --package=playwright@1.53.1 --package=pngjs@7.0.0 -- node /tmp/verify-aircraft-views.cjs
          for image in aircraft-view-verification/crj700-left.png aircraft-view-verification/crj700-right.png aircraft-view-verification/crj700-overhead.png; do
            test -s "${image}"
            test "$(stat -c%s "${image}")" -gt 10000
          done
          test -s aircraft-view-verification/report.json

      - name: Upload exact production aircraft evidence
        uses: actions/upload-artifact@v4
        with:
          name: rampready-crj700-production-views-${{ steps.release.outputs.expected_sha }}
          path: aircraft-view-verification/
          if-no-files-found: error
          retention-days: 30