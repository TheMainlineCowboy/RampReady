name: Verify RampReady Live Experience

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact deployed commit SHA to verify
        required: true
        type: string

permissions:
  contents: read
  statuses: write

env:
  PAGE_URL: https://themainlinecowboy.github.io/RampReady/

jobs:
  verify-live-experience:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Resolve exact deployed commit
        id: release
        shell: bash
        env:
          PUSH_SHA: ${{ github.sha }}
          DISPATCH_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          expected_sha="${DISPATCH_SHA:-${PUSH_SHA:-}}"
          test -n "${expected_sha}"
          echo "expected_sha=${expected_sha}" >> "${GITHUB_OUTPUT}"

      - name: Check out exact deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.expected_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies and Chromium
        run: |
          npm ci
          npm install --no-save --package-lock=false playwright@1.53.1
          npx playwright install --with-deps chromium

      - name: Wait for exact GitHub Pages release
        shell: bash
        env:
          EXPECTED_SHA: ${{ steps.release.outputs.expected_sha }}
        run: |
          set -euo pipefail
          for attempt in {1..90}; do
            status=$(curl -L -sS -o /tmp/release-commit.txt -w '%{http_code}' "${PAGE_URL}release-commit.txt?verify=${EXPECTED_SHA}-${attempt}")
            live_sha=$(tr -d '\r\n' < /tmp/release-commit.txt 2>/dev/null || true)
            if [ "${status}" = "200" ] && [ "${live_sha}" = "${EXPECTED_SHA}" ]; then
              echo "Exact release ${EXPECTED_SHA} is live after attempt ${attempt}."
              exit 0
            fi
            echo "Attempt ${attempt}: marker=${status}, live_sha=${live_sha:-missing}; retrying..."
            sleep 10
          done
          echo "GitHub Pages did not serve exact commit ${EXPECTED_SHA} within 15 minutes." >&2
          exit 1

      - name: Verify live equipment, controls, camera, and aircraft
        id: browser
        continue-on-error: true
        shell: bash
        env:
          EXPECTED_SHA: ${{ steps.release.outputs.expected_sha }}
        run: |
          set +e
          mkdir -p live-experience-evidence
          node scripts/verify-live-experience-browser.cjs
          exit_code=$?
          if [ "${exit_code}" -eq 0 ]; then
            summary="Live equipment, controls, camera and aircraft verified"
          elif [ -s live-experience-evidence/error.txt ]; then
            summary=$(head -n 1 live-experience-evidence/error.txt | tr '\r\n' ' ' | sed 's/[[:space:]]\+/ /g')
          else
            summary="Live browser verifier exited ${exit_code} without an error file"
            printf '%s\n' "${summary}" > live-experience-evidence/error.txt
          fi
          summary=${summary:0:125}
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          echo "summary=${summary}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload live-experience evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rampready-live-experience-${{ steps.release.outputs.expected_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: live-experience-evidence/
          if-no-files-found: warn
          retention-days: 30

      - name: Publish exact live-experience verdict
        if: always()
        uses: actions/github-script@v7
        env:
          EXPECTED_SHA: ${{ steps.release.outputs.expected_sha }}
          EXIT_CODE: ${{ steps.browser.outputs.exit_code }}
          ERROR_SUMMARY: ${{ steps.browser.outputs.summary }}
        with:
          script: |
            const passed = process.env.EXIT_CODE === '0';
            const description = (process.env.ERROR_SUMMARY || 'Live verifier did not return a result').slice(0, 140);
            for (const statusContext of ['production/rampready-live-experience', 'production/crj700-side-views']) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: process.env.EXPECTED_SHA,
                state: passed ? 'success' : 'failure',
                context: statusContext,
                description,
                target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            }

      - name: Enforce live-experience verdict
        if: always()
        shell: bash
        env:
          EXIT_CODE: ${{ steps.browser.outputs.exit_code }}
          ERROR_SUMMARY: ${{ steps.browser.outputs.summary }}
        run: |
          if [ "${EXIT_CODE:-1}" -ne 0 ]; then
            echo "${ERROR_SUMMARY:-Live browser verification failed}" >&2
            exit 1
          fi
