name: Verify RampReady

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rampready-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build verified production bundle
        run: npm run build

      - name: Smoke-check deploy output
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/manifest.webmanifest
          grep -q 'src="/assets/' dist/index.html
          grep -q 'rel="manifest"' dist/index.html
          find dist/assets -type f -size +0c | grep -q .
          echo "Production bundle contains index, manifest, and non-empty hashed assets."

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: rampready-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
