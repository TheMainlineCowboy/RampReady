name: Verify RampReady

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rampready-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build verified production bundle
        id: production-build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee rampready-build.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rampready-build-log-${{ github.sha }}
          path: rampready-build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Verify build left tracked source clean
        if: always()
        shell: bash
        run: |
          if ! git diff --exit-code -- . ':!dist'; then
            echo "Build left tracked files modified. The diff above identifies the leaked runtime transformation."
            exit 1
          fi
          echo "Build left the tracked source tree clean."

      - name: Smoke-check deploy output
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/manifest.webmanifest
          grep -q 'src="/RampReady/assets/' dist/index.html
          grep -q 'href="/RampReady/manifest.webmanifest"' dist/index.html
          find dist/assets -type f -size +0c | grep -q .
          test -s dist/models/crj700-mobile.glb
          echo "Production bundle contains Pages-scoped index, manifest, non-empty hashed assets, and the CRJ700 GLB."

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: rampready-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7
