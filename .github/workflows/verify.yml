name: Verify RampReady

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rampready-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run structural and physics verification
        run: npm run verify

      - name: Build production bundle
        run: npm run build

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: rampready-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
