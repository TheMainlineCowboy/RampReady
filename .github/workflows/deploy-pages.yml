name: Deploy RampReady to GitHub Pages

on:
  push:
    branches:
      - integrate-crj700-model
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Verify aircraft and trainer
        run: npm run verify

      - name: Build production site
        run: npm run build

      - name: Verify Pages artifact
        run: |
          test -f dist/index.html
          test -f dist/models/crj700-mobile.glb
          test -s dist/models/crj700-mobile.glb
          grep -q '/RampReady/' dist/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
