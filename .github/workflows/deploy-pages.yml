name: Deploy RampReady to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run complete RampReady verification suite
        run: npm run verify

      - name: Materialize verified CRJ700 runtime copy
        shell: bash
        run: |
          set -euo pipefail
          source_asset="public/models/crj700/crj700-mobile.glb"
          runtime_asset="public/models/crj700-mobile.glb"
          test -s "${source_asset}"
          test "$(stat -c%s "${source_asset}")" -gt 10000
          printf 'glTF' | cmp -n 4 - "${source_asset}"
          cp "${source_asset}" "${runtime_asset}"
          cmp "${source_asset}" "${runtime_asset}"
          printf '%s\n' "${GITHUB_SHA}" > public/release-commit.txt

      - name: Build verified production site
        run: npm run build

      - name: Verify GitHub Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/index.html
          test -s dist/manifest.webmanifest
          test -s dist/models/crj700-mobile.glb
          test -s dist/release-commit.txt
          test -d dist/assets
          find dist/assets -type f -size +0c | grep -q .
          grep -Eq 'src="/RampReady/assets/[^\"]+\.js"' dist/index.html
          cmp public/models/crj700/crj700-mobile.glb dist/models/crj700-mobile.glb
          printf 'glTF' | cmp -n 4 - dist/models/crj700-mobile.glb
          test "$(tr -d '\r\n' < dist/release-commit.txt)" = "${GITHUB_SHA}"
          sha256sum public/models/crj700/crj700-mobile.glb dist/models/crj700-mobile.glb

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live-site:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 15
    steps:
      - name: Verify exact propagated release and CRJ700 bytes
        shell: bash
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          : "${PAGE_URL:?GitHub Pages did not return a deployment URL}"
          mkdir -p live-verification
          verified=false
          for attempt in $(seq 1 60); do
            cache_bust="verify=${EXPECTED_SHA}-${attempt}-$(date +%s)"
            index_status=$(curl --fail-with-body -L -sS -H 'Cache-Control: no-cache' -o /tmp/rampready-index.html -w '%{http_code}' "${PAGE_URL}?${cache_bust}" || true)
            marker_status=$(curl --fail-with-body -L -sS -H 'Cache-Control: no-cache' -o /tmp/release-commit.txt -w '%{http_code}' "${PAGE_URL}release-commit.txt?${cache_bust}" || true)
            live_sha=$(tr -d '\r\n' < /tmp/release-commit.txt 2>/dev/null || true)
            if [ "${index_status}" = "200" ] && [ "${marker_status}" = "200" ] && [ "${live_sha}" = "${EXPECTED_SHA}" ] && grep -q '<div id="root"></div>' /tmp/rampready-index.html; then
              verified=true
              break
            fi
            echo "Attempt ${attempt}/60: index=${index_status:-none}, marker=${marker_status:-none}, live_sha=${live_sha:-missing}"
            sleep 10
          done
          test "${verified}" = true

          asset_status=$(curl --fail-with-body -L -sS -H 'Cache-Control: no-cache' -o /tmp/crj700-mobile.glb -w '%{http_code}' "${PAGE_URL}models/crj700-mobile.glb?sha=${EXPECTED_SHA}")
          test "${asset_status}" = "200"
          test "$(stat -c%s /tmp/crj700-mobile.glb)" -gt 10000
          printf 'glTF' | cmp -n 4 - /tmp/crj700-mobile.glb

          live_hash=$(sha256sum /tmp/crj700-mobile.glb | cut -d' ' -f1)
          verified_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          cat > live-verification/receipt.json <<EOF
          {
            "commit": "${EXPECTED_SHA}",
            "pageUrl": "${PAGE_URL}",
            "verifiedAtUtc": "${verified_at}",
            "indexStatus": 200,
            "releaseMarkerStatus": 200,
            "crj700Status": 200,
            "crj700Bytes": $(stat -c%s /tmp/crj700-mobile.glb),
            "crj700Sha256": "${live_hash}",
            "crj700Magic": "glTF"
          }
          EOF

      - name: Verify live Three.js runtime and real CRJ700 request
        shell: bash
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          npm exec --yes --package=playwright@1.53.1 -- playwright install --with-deps chromium
          cat > /tmp/verify-rampready-live.cjs <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('node:fs');

          (async () => {
            const pageUrl = process.env.PAGE_URL;
            const expectedSha = process.env.EXPECTED_SHA;
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
            const consoleErrors = [];
            const pageErrors = [];
            const failedRequests = [];
            let modelResponse = null;

            page.on('console', message => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });
            page.on('pageerror', error => pageErrors.push(error.message));
            page.on('requestfailed', request => failedRequests.push(`${request.method()} ${request.url()} :: ${request.failure()?.errorText || 'unknown'}`));
            page.on('response', response => {
              const url = new URL(response.url());
              if (url.pathname.endsWith('/models/crj700-mobile.glb')) {
                modelResponse = { url: response.url(), status: response.status(), ok: response.ok() };
              }
            });

            const response = await page.goto(`${pageUrl}?runtime=${expectedSha}`, { waitUntil: 'networkidle', timeout: 90000 });
            if (!response || !response.ok()) throw new Error(`Live page navigation failed: ${response?.status() || 'no response'}`);
            await page.waitForTimeout(12000);

            const runtime = await page.evaluate(() => {
              const canvas = document.querySelector('canvas');
              const root = document.querySelector('#root');
              const rect = canvas?.getBoundingClientRect();
              return {
                title: document.title,
                rootChildren: root?.childElementCount || 0,
                canvasPresent: Boolean(canvas),
                canvasWidth: canvas?.width || 0,
                canvasHeight: canvas?.height || 0,
                canvasCssWidth: rect?.width || 0,
                canvasCssHeight: rect?.height || 0,
                resourceUrls: performance.getEntriesByType('resource').map(entry => entry.name).filter(name => name.includes('crj700-mobile.glb')),
              };
            });

            await page.locator('canvas').first().screenshot({ path: 'live-verification/rampready-canvas.png' });
            await page.screenshot({ path: 'live-verification/rampready-live.png', fullPage: true });
            const report = { pageUrl, expectedSha, runtime, modelResponse, consoleErrors, pageErrors, failedRequests };
            fs.writeFileSync('live-verification/browser-report.json', JSON.stringify(report, null, 2));

            if (runtime.rootChildren < 1) throw new Error('React root did not initialize');
            if (!runtime.canvasPresent) throw new Error('Three.js canvas is missing');
            if (runtime.canvasWidth < 640 || runtime.canvasHeight < 360) throw new Error(`Canvas backing size is too small: ${runtime.canvasWidth}x${runtime.canvasHeight}`);
            if (runtime.canvasCssWidth < 640 || runtime.canvasCssHeight < 360) throw new Error(`Visible canvas is too small: ${runtime.canvasCssWidth}x${runtime.canvasCssHeight}`);
            if (!modelResponse || !modelResponse.ok || modelResponse.status !== 200) throw new Error(`Browser did not load the CRJ700 GLB successfully: ${JSON.stringify(modelResponse)}`);
            if (!runtime.resourceUrls.length) throw new Error('Resource Timing did not record the CRJ700 GLB');
            if (pageErrors.length) throw new Error(`Uncaught browser errors: ${pageErrors.join(' | ')}`);
            if (consoleErrors.length) throw new Error(`Console errors: ${consoleErrors.join(' | ')}`);
            if (failedRequests.length) throw new Error(`Failed browser requests: ${failedRequests.join(' | ')}`);
            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          EOF
          npm exec --yes --package=playwright@1.53.1 -- node /tmp/verify-rampready-live.cjs
          test -s live-verification/rampready-canvas.png
          test "$(stat -c%s live-verification/rampready-canvas.png)" -gt 10000
          test -s live-verification/rampready-live.png
          test "$(stat -c%s live-verification/rampready-live.png)" -gt 10000
          test -s live-verification/browser-report.json

      - name: Upload live-site verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: rampready-live-verification-${{ github.sha }}
          path: live-verification/
          if-no-files-found: error
          retention-days: 30
