name: Deploy RampReady to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run complete RampReady verification suite
        run: npm run verify

      - name: Materialize verified CRJ700 runtime copy
        shell: bash
        run: |
          set -euo pipefail
          source_asset="public/models/crj700/crj700-mobile.glb"
          runtime_asset="public/models/crj700-mobile.glb"
          test -s "${source_asset}"
          test "$(stat -c%s "${source_asset}")" -gt 10000
          printf 'glTF' | cmp -n 4 - "${source_asset}"
          cp "${source_asset}" "${runtime_asset}"
          cmp "${source_asset}" "${runtime_asset}"
          printf '%s\n' "${GITHUB_SHA}" > public/release-commit.txt
          echo "Verified CRJ700 source, runtime copy, and release commit marker."

      - name: Build verified production site
        run: npm run build

      - name: Verify GitHub Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/index.html
          test -s dist/manifest.webmanifest
          test -s dist/models/crj700-mobile.glb
          test -s dist/release-commit.txt
          test -d dist/assets
          find dist/assets -type f -size +0c | grep -q .
          grep -Eq 'src="/RampReady/assets/[^\"]+\.js"' dist/index.html
          cmp public/models/crj700/crj700-mobile.glb dist/models/crj700-mobile.glb
          printf 'glTF' | cmp -n 4 - dist/models/crj700-mobile.glb
          test "$(tr -d '\r\n' < dist/release-commit.txt)" = "${GITHUB_SHA}"
          echo "Pages artifact contains the app shell, verified assets, byte-identical CRJ700 payload, and exact release SHA."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live-site:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for GitHub Pages propagation
        run: sleep 15

      - name: Verify exact live release and CRJ700 asset
        shell: bash
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          : "${PAGE_URL:?GitHub Pages did not return a deployment URL}"
          for attempt in {1..12}; do
            status=$(curl -L -sS -o /tmp/rampready-index.html -w '%{http_code}' "${PAGE_URL}")
            marker_status=$(curl -L -sS -o /tmp/release-commit.txt -w '%{http_code}' "${PAGE_URL}release-commit.txt")
            live_sha=$(tr -d '\r\n' < /tmp/release-commit.txt 2>/dev/null || true)
            if [ "${status}" = "200" ] && [ "${marker_status}" = "200" ] && [ "${live_sha}" = "${EXPECTED_SHA}" ] && grep -q '<div id="root"></div>' /tmp/rampready-index.html; then
              break
            fi
            echo "Attempt ${attempt}: site=${status}, marker=${marker_status}, live_sha=${live_sha:-missing}; retrying..."
            sleep 10
          done
          test -s /tmp/rampready-index.html
          grep -q '<div id="root"></div>' /tmp/rampready-index.html
          test "$(tr -d '\r\n' < /tmp/release-commit.txt)" = "${EXPECTED_SHA}"
          asset_status=$(curl -L -sS -o /tmp/crj700-mobile.glb -w '%{http_code}' "${PAGE_URL}models/crj700-mobile.glb")
          test "${asset_status}" = "200"
          test "$(stat -c%s /tmp/crj700-mobile.glb)" -gt 10000
          printf 'glTF' | cmp -n 4 - /tmp/crj700-mobile.glb
          mkdir -p live-verification
          index_bytes=$(stat -c%s /tmp/rampready-index.html)
          asset_bytes=$(stat -c%s /tmp/crj700-mobile.glb)
          verified_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          cat > live-verification/receipt.json <<EOF
          {
            "commit": "${EXPECTED_SHA}",
            "pageUrl": "${PAGE_URL}",
            "verifiedAtUtc": "${verified_at}",
            "indexStatus": 200,
            "releaseMarkerStatus": 200,
            "crj700Status": 200,
            "indexBytes": ${index_bytes},
            "crj700Bytes": ${asset_bytes},
            "crj700Magic": "glTF"
          }
          EOF
          echo "Exact commit ${EXPECTED_SHA} and its CRJ700 payload are live at ${PAGE_URL}"

      - name: Verify live browser runtime and capture evidence
        shell: bash
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          : "${PAGE_URL:?GitHub Pages did not return a deployment URL}"
          npx --yes playwright@1.53.1 install --with-deps chromium
          cat > /tmp/verify-rampready-live.cjs <<'EOF'
          const { chromium } = require('playwright');
          const { PNG } = require('pngjs');
          const fs = require('node:fs');

          function analyzeCanvasPng(filePath) {
            const png = PNG.sync.read(fs.readFileSync(filePath));
            const quantizedColors = new Set();
            let luminanceSum = 0;
            let luminanceSquaredSum = 0;
            let sampleCount = 0;
            const stride = Math.max(1, Math.floor(Math.min(png.width, png.height) / 180));

            for (let y = 0; y < png.height; y += stride) {
              for (let x = 0; x < png.width; x += stride) {
                const offset = (png.width * y + x) * 4;
                const r = png.data[offset];
                const g = png.data[offset + 1];
                const b = png.data[offset + 2];
                const a = png.data[offset + 3];
                if (a < 16) continue;
                quantizedColors.add(`${r >> 4},${g >> 4},${b >> 4}`);
                const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                luminanceSum += luminance;
                luminanceSquaredSum += luminance * luminance;
                sampleCount += 1;
              }
            }

            const mean = sampleCount ? luminanceSum / sampleCount : 0;
            const variance = sampleCount ? Math.max(0, luminanceSquaredSum / sampleCount - mean * mean) : 0;
            return {
              width: png.width,
              height: png.height,
              sampleCount,
              quantizedColorCount: quantizedColors.size,
              meanLuminance: Number(mean.toFixed(3)),
              luminanceStdDev: Number(Math.sqrt(variance).toFixed(3)),
            };
          }

          (async () => {
            const pageUrl = process.env.PAGE_URL;
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
            const consoleErrors = [];
            const pageErrors = [];
            const failedRequests = [];
            let crj700Response = null;

            page.on('console', message => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });
            page.on('pageerror', error => pageErrors.push(error.message));
            page.on('requestfailed', request => {
              failedRequests.push(`${request.method()} ${request.url()} :: ${request.failure()?.errorText || 'unknown'}`);
            });
            page.on('response', response => {
              if (response.url().endsWith('/models/crj700-mobile.glb')) {
                crj700Response = { url: response.url(), status: response.status(), ok: response.ok() };
              }
            });

            const response = await page.goto(pageUrl, { waitUntil: 'networkidle', timeout: 60000 });
            if (!response || !response.ok()) throw new Error(`Live page navigation failed: ${response?.status() || 'no response'}`);
            await page.waitForTimeout(12000);

            const runtime = await page.evaluate(() => {
              const canvas = document.querySelector('canvas');
              const root = document.querySelector('#root');
              const rect = canvas?.getBoundingClientRect();
              return {
                title: document.title,
                rootChildren: root?.childElementCount || 0,
                canvasPresent: Boolean(canvas),
                canvasWidth: canvas?.width || 0,
                canvasHeight: canvas?.height || 0,
                canvasCssWidth: rect?.width || 0,
                canvasCssHeight: rect?.height || 0,
                bodyTextLength: document.body?.innerText?.trim().length || 0,
              };
            });

            const canvas = page.locator('canvas').first();
            await canvas.screenshot({ path: 'live-verification/rampready-canvas.png' });
            await page.screenshot({ path: 'live-verification/rampready-live.png', fullPage: true });
            const canvasVisual = analyzeCanvasPng('live-verification/rampready-canvas.png');
            const report = { pageUrl, runtime, canvasVisual, crj700Response, consoleErrors, pageErrors, failedRequests };
            fs.writeFileSync('live-verification/browser-report.json', JSON.stringify(report, null, 2));

            if (runtime.rootChildren < 1) throw new Error('React root did not initialize');
            if (!runtime.canvasPresent) throw new Error('Three.js canvas is missing');
            if (runtime.canvasWidth < 640 || runtime.canvasHeight < 360) throw new Error(`Canvas backing size is too small: ${runtime.canvasWidth}x${runtime.canvasHeight}`);
            if (runtime.canvasCssWidth < 640 || runtime.canvasCssHeight < 360) throw new Error(`Visible canvas is too small: ${runtime.canvasCssWidth}x${runtime.canvasCssHeight}`);
            if (canvasVisual.sampleCount < 1000) throw new Error(`Canvas visual sample is too small: ${canvasVisual.sampleCount}`);
            if (canvasVisual.quantizedColorCount < 32) throw new Error(`Canvas appears visually blank or uniform: ${canvasVisual.quantizedColorCount} quantized colors`);
            if (canvasVisual.luminanceStdDev < 4) throw new Error(`Canvas lacks meaningful rendered contrast: standard deviation ${canvasVisual.luminanceStdDev}`);
            if (!crj700Response || !crj700Response.ok) throw new Error(`Browser did not successfully load the CRJ700 GLB: ${JSON.stringify(crj700Response)}`);
            if (pageErrors.length) throw new Error(`Uncaught browser errors: ${pageErrors.join(' | ')}`);
            if (consoleErrors.length) throw new Error(`Console errors: ${consoleErrors.join(' | ')}`);
            if (failedRequests.length) throw new Error(`Failed browser requests: ${failedRequests.join(' | ')}`);

            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          EOF
          npm exec --yes --package=playwright@1.53.1 --package=pngjs@7.0.0 -- node /tmp/verify-rampready-live.cjs
          test -s live-verification/rampready-canvas.png
          test "$(stat -c%s live-verification/rampready-canvas.png)" -gt 10000
          test -s live-verification/rampready-live.png
          test "$(stat -c%s live-verification/rampready-live.png)" -gt 10000
          test -s live-verification/browser-report.json
          echo "Verified live React/Three.js runtime, nonblank canvas rendering, successful browser CRJ700 load, clean browser errors, and captured rendering evidence."

      - name: Upload live-site verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: rampready-live-verification-${{ github.sha }}
          path: live-verification/
          if-no-files-found: error
          retention-days: 30
