name: Deploy RampReady to GitHub Pages

on:
  push:
    branches:
      - integrate-crj700-model
      - main
      - fix-crj700-runtime-copy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Materialize verified CRJ700 runtime copy
        shell: bash
        run: |
          set -euo pipefail
          source_asset="public/models/crj700/crj700-mobile.glb"
          runtime_asset="public/models/crj700-mobile.glb"
          test -s "${source_asset}"
          test "$(stat -c%s "${source_asset}")" -gt 10000
          printf 'glTF' | cmp -n 4 - "${source_asset}"
          cp "${source_asset}" "${runtime_asset}"
          cmp "${source_asset}" "${runtime_asset}"
          echo "Verified and copied CRJ700 source asset to the exact Three.js runtime URL."

      - name: Build verified production site
        run: npm run build

      - name: Verify GitHub Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/index.html
          test -s dist/manifest.webmanifest
          test -s dist/models/crj700-mobile.glb
          test -d dist/assets
          find dist/assets -type f -size +0c | grep -q .
          grep -Eq 'src="/RampReady/assets/[^\"]+\.js"' dist/index.html
          cmp public/models/crj700/crj700-mobile.glb dist/models/crj700-mobile.glb
          printf 'glTF' | cmp -n 4 - dist/models/crj700-mobile.glb
          echo "Pages artifact contains the app shell, hashed assets, manifest, and byte-identical real CRJ700 payload."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live-site:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for GitHub Pages propagation
        run: sleep 15

      - name: Verify live RampReady site and CRJ700 asset
        shell: bash
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          : "${PAGE_URL:?GitHub Pages did not return a deployment URL}"
          for attempt in {1..12}; do
            status=$(curl -L -sS -o /tmp/rampready-index.html -w '%{http_code}' "${PAGE_URL}")
            if [ "${status}" = "200" ] && grep -q '<div id="root"></div>' /tmp/rampready-index.html; then
              break
            fi
            echo "Attempt ${attempt}: ${PAGE_URL} returned HTTP ${status}; retrying..."
            sleep 10
          done
          test -s /tmp/rampready-index.html
          grep -q '<div id="root"></div>' /tmp/rampready-index.html
          asset_status=$(curl -L -sS -o /tmp/crj700-mobile.glb -w '%{http_code}' "${PAGE_URL}models/crj700-mobile.glb")
          test "${asset_status}" = "200"
          test "$(stat -c%s /tmp/crj700-mobile.glb)" -gt 10000
          printf 'glTF' | cmp -n 4 - /tmp/crj700-mobile.glb
          echo "Live GitHub Pages site and CRJ700 payload are reachable at ${PAGE_URL}"
