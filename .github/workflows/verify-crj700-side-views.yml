name: Verify CRJ700 Side Views

on:
  workflow_run:
    workflows:
      - Deploy RampReady to GitHub Pages
    types:
      - completed

permissions:
  contents: read

jobs:
  verify-side-views:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install browser verifier
        run: |
          npm install --no-save --package-lock=false playwright@1.53.1
          npx playwright install --with-deps chromium

      - name: Capture live CRJ700 side views
        env:
          PAGE_URL: https://themainlinecowboy.github.io/RampReady/
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          mkdir -p crj700-side-view-evidence
          cat > verify-crj700-side-views.cjs <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('node:fs');

          async function orbit(page, canvas, dx) {
            const box = await canvas.boundingBox();
            if (!box) throw new Error('Three.js canvas has no visible bounding box');
            const x = box.x + box.width * 0.5;
            const y = box.y + box.height * 0.55;
            await page.mouse.move(x, y);
            await page.mouse.down();
            await page.mouse.move(x + dx, y, { steps: 24 });
            await page.mouse.up();
            await page.waitForTimeout(1800);
          }

          (async () => {
            const pageUrl = process.env.PAGE_URL;
            const expectedSha = process.env.EXPECTED_SHA;
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
            const consoleErrors = [];
            const pageErrors = [];
            const failedRequests = [];
            let modelResponse = null;

            page.on('console', message => { if (message.type() === 'error') consoleErrors.push(message.text()); });
            page.on('pageerror', error => pageErrors.push(error.message));
            page.on('requestfailed', request => failedRequests.push(`${request.method()} ${request.url()} :: ${request.failure()?.errorText || 'unknown'}`));
            page.on('response', response => {
              const url = new URL(response.url());
              if (url.pathname.endsWith('/models/crj700-mobile.glb')) {
                modelResponse = { url: response.url(), status: response.status(), ok: response.ok() };
              }
            });

            const response = await page.goto(`${pageUrl}?side-view-verification=${expectedSha}`, { waitUntil: 'networkidle', timeout: 90000 });
            if (!response || !response.ok()) throw new Error(`Live page navigation failed: ${response?.status() || 'no response'}`);
            await page.waitForTimeout(12000);

            const liveSha = (await page.request.get(`${pageUrl}release-commit.txt?verify=${expectedSha}`)).body();
            const servedSha = (await liveSha).toString('utf8').trim();
            if (servedSha !== expectedSha) throw new Error(`Live release marker mismatch: expected ${expectedSha}, received ${servedSha}`);

            const canvas = page.locator('canvas').first();
            await canvas.waitFor({ state: 'visible', timeout: 30000 });
            await canvas.screenshot({ path: 'crj700-side-view-evidence/crj700-front.png' });

            await orbit(page, canvas, 430);
            await canvas.screenshot({ path: 'crj700-side-view-evidence/crj700-left-profile.png' });

            await orbit(page, canvas, -860);
            await canvas.screenshot({ path: 'crj700-side-view-evidence/crj700-right-profile.png' });

            const evidence = {
              commit: expectedSha,
              pageUrl,
              modelResponse,
              consoleErrors,
              pageErrors,
              failedRequests,
              files: ['crj700-front.png', 'crj700-left-profile.png', 'crj700-right-profile.png'],
            };
            fs.writeFileSync('crj700-side-view-evidence/report.json', JSON.stringify(evidence, null, 2));

            if (!modelResponse || modelResponse.status !== 200 || !modelResponse.ok) throw new Error(`CRJ700 model did not load: ${JSON.stringify(modelResponse)}`);
            if (consoleErrors.length) throw new Error(`Console errors: ${consoleErrors.join(' | ')}`);
            if (pageErrors.length) throw new Error(`Page errors: ${pageErrors.join(' | ')}`);
            if (failedRequests.length) throw new Error(`Failed requests: ${failedRequests.join(' | ')}`);
            for (const file of evidence.files) {
              const bytes = fs.statSync(`crj700-side-view-evidence/${file}`).size;
              if (bytes < 10000) throw new Error(`${file} is unexpectedly small: ${bytes} bytes`);
            }

            await browser.close();
          })().catch(error => { console.error(error); process.exit(1); });
          EOF
          node verify-crj700-side-views.cjs

      - name: Upload CRJ700 side-view evidence
        uses: actions/upload-artifact@v4
        with:
          name: crj700-side-views-${{ github.event.workflow_run.head_sha }}
          path: crj700-side-view-evidence/
          if-no-files-found: error
          retention-days: 30
