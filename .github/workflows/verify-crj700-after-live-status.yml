name: Recover CRJ700 Side-View Verification

on:
  workflow_run:
    workflows:
      - Verify RampReady CRJ700 Production Byte Identity
    types:
      - completed

permissions:
  contents: read
  statuses: write

concurrency:
  group: crj700-side-view-recovery-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  verify-side-views:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out verified live commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install browser verifier
        run: |
          npm install --no-save --package-lock=false playwright@1.53.1
          npx playwright install --with-deps chromium

      - name: Capture exact live CRJ700 side views
        env:
          PAGE_URL: https://themainlinecowboy.github.io/RampReady/
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          mkdir -p crj700-side-view-evidence
          cat > verify-crj700-side-views.cjs <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('node:fs');

          async function canvasCenter(canvas) {
            const box = await canvas.boundingBox();
            if (!box) throw new Error('Three.js canvas has no visible bounding box');
            return { x: box.x + box.width * 0.5, y: box.y + box.height * 0.55 };
          }

          async function orbit(page, canvas, dx) {
            const { x, y } = await canvasCenter(canvas);
            await page.mouse.move(x, y);
            await page.mouse.down();
            await page.mouse.move(x + dx, y, { steps: 72 });
            await page.mouse.up();
            await page.waitForTimeout(2600);
          }

          async function zoomOut(page, canvas) {
            const { x, y } = await canvasCenter(canvas);
            await page.mouse.move(x, y);
            await page.mouse.wheel(0, 5200);
            await page.waitForTimeout(2600);
          }

          async function hideNonCanvasUi(page) {
            await page.evaluate(() => {
              const canvas = document.querySelector('canvas');
              if (!canvas) throw new Error('Three.js canvas is missing');
              for (const element of document.querySelectorAll('body *')) {
                if (element === canvas || element.contains(canvas) || canvas.contains(element)) continue;
                element.style.setProperty('visibility', 'hidden', 'important');
              }
              document.documentElement.style.background = '#9fc5e8';
              document.body.style.background = '#9fc5e8';
            });
            await page.waitForTimeout(500);
          }

          (async () => {
            const pageUrl = process.env.PAGE_URL;
            const expectedSha = process.env.EXPECTED_SHA;
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1600, height: 1000 } });
            const consoleErrors = [];
            const pageErrors = [];
            const failedRequests = [];
            let modelResponse = null;

            page.on('console', message => { if (message.type() === 'error') consoleErrors.push(message.text()); });
            page.on('pageerror', error => pageErrors.push(error.message));
            page.on('requestfailed', request => failedRequests.push(`${request.method()} ${request.url()} :: ${request.failure()?.errorText || 'unknown'}`));
            page.on('response', response => {
              const url = new URL(response.url());
              if (url.pathname.endsWith('/models/crj700-mobile.glb')) {
                modelResponse = { url: response.url(), status: response.status(), ok: response.ok() };
              }
            });

            const response = await page.goto(`${pageUrl}?side-view-recovery=${expectedSha}`, { waitUntil: 'networkidle', timeout: 90000 });
            if (!response || !response.ok()) throw new Error(`Live page navigation failed: ${response?.status() || 'no response'}`);
            await page.waitForTimeout(12000);

            const markerResponse = await page.request.get(`${pageUrl}release-commit.txt?verify=${expectedSha}`);
            if (!markerResponse.ok()) throw new Error(`Release marker request failed: ${markerResponse.status()}`);
            const servedSha = (await markerResponse.body()).toString('utf8').trim();
            if (servedSha !== expectedSha) throw new Error(`Live release marker mismatch: expected ${expectedSha}, received ${servedSha}`);

            const canvas = page.locator('canvas').first();
            await canvas.waitFor({ state: 'visible', timeout: 30000 });
            await hideNonCanvasUi(page);
            await zoomOut(page, canvas);
            await canvas.screenshot({ path: 'crj700-side-view-evidence/crj700-front.png' });
            await orbit(page, canvas, 1250);
            await canvas.screenshot({ path: 'crj700-side-view-evidence/crj700-left-profile.png' });
            await orbit(page, canvas, -2500);
            await canvas.screenshot({ path: 'crj700-side-view-evidence/crj700-right-profile.png' });

            const files = ['crj700-front.png', 'crj700-left-profile.png', 'crj700-right-profile.png'];
            const evidence = {
              commit: expectedSha,
              pageUrl,
              modelResponse,
              consoleErrors,
              pageErrors,
              failedRequests,
              viewport: { width: 1600, height: 1000 },
              uiHidden: true,
              zoomOutDeltaY: 5200,
              orbitDragPixels: 1250,
              files,
            };
            fs.writeFileSync('crj700-side-view-evidence/report.json', JSON.stringify(evidence, null, 2));

            if (!modelResponse || modelResponse.status !== 200 || !modelResponse.ok) throw new Error(`CRJ700 model did not load: ${JSON.stringify(modelResponse)}`);
            if (consoleErrors.length) throw new Error(`Console errors: ${consoleErrors.join(' | ')}`);
            if (pageErrors.length) throw new Error(`Page errors: ${pageErrors.join(' | ')}`);
            if (failedRequests.length) throw new Error(`Failed requests: ${failedRequests.join(' | ')}`);
            for (const file of files) {
              const bytes = fs.statSync(`crj700-side-view-evidence/${file}`).size;
              if (bytes < 10000) throw new Error(`${file} is unexpectedly small: ${bytes} bytes`);
            }

            await browser.close();
          })().catch(error => { console.error(error); process.exit(1); });
          EOF
          node verify-crj700-side-views.cjs

      - name: Upload recovered CRJ700 side-view evidence
        uses: actions/upload-artifact@v4
        with:
          name: recovered-crj700-side-views-${{ github.event.workflow_run.head_sha }}
          path: crj700-side-view-evidence/
          if-no-files-found: error
          retention-days: 30

  publish-side-view-status:
    if: >-
      always() &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    needs:
      - verify-side-views
    runs-on: ubuntu-latest
    steps:
      - name: Publish recovered side-view verification verdict
        uses: actions/github-script@v7
        env:
          VERIFY_RESULT: ${{ needs.verify-side-views.result }}
          DEPLOYED_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const sha = process.env.DEPLOYED_SHA;
            const passed = process.env.VERIFY_RESULT === 'success';
            const description = passed
              ? 'Recovered full-airframe live CRJ700 side evidence'
              : `Recovered CRJ700 side-view verification ${process.env.VERIFY_RESULT}`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: passed ? 'success' : 'failure',
              context: 'production/crj700-side-views',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

            if (!passed) core.setFailed(description);
